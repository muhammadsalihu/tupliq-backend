databases:
  - name: tupliq-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: tupliq-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tupliq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGINS
        value: "*"
      - key: NODE_VERSION
        value: 20.18.0
